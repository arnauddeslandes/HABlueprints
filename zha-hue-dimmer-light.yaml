blueprint:
name: Philips Hue Dimmer v2 - ZHA
description: Contrôle une lumière avec le Philips Hue Dimmer Switch v2 via ZHA.
domain: automation
input:
remote:
name: Télécommande Hue Dimmer v2 (ZHA)
description: Sélectionner la télécommande Philips Hue Dimmer v2 associée via ZHA.
selector:
device:
integration: zha
manufacturer: Signify Netherlands B.V.
model: RWL022


light:
  name: Lumière à contrôler
  description: Sélectionner la lumière ou le groupe de lumières à contrôler.
  selector:
    entity:
      domain: light

brightness_step:
  name: Pas de variation de luminosité (%)
  description: Valeur en pourcentage de la variation de luminosité à chaque appui.
  default: 15
  selector:
    number:
      min: 5
      max: 50
      step: 5
      unit_of_measurement: "%"

transition_time:
  name: Durée de transition (secondes)
  description: Durée de la transition lors des changements de luminosité.
  default: 1
  selector:
    number:
      min: 0
      max: 5
      step: 0.5
      unit_of_measurement: "s"


mode: restart
max_exceeded: silent

trigger:

- platform: device
  domain: zha
  device_id: !input remote
  type: remote_button_short_press
  subtype: turn_on
  id: “on_press”
- platform: device
  domain: zha
  device_id: !input remote
  type: remote_button_short_press
  subtype: turn_off
  id: “off_press”
- platform: device
  domain: zha
  device_id: !input remote
  type: remote_button_short_press
  subtype: dim_up
  id: “dim_up_short”
- platform: device
  domain: zha
  device_id: !input remote
  type: remote_button_long_press
  subtype: dim_up
  id: “dim_up_long”
- platform: device
  domain: zha
  device_id: !input remote
  type: remote_button_short_press
  subtype: dim_down
  id: “dim_down_short”
- platform: device
  domain: zha
  device_id: !input remote
  type: remote_button_long_press
  subtype: dim_down
  id: “dim_down_long”

action:

- variables:
  light_target: !input light
  step: !input brightness_step
  transition: !input transition_time
- choose:
  
  # — Allumer —
  - conditions:
    - condition: trigger
      id: “on_press”
      sequence:
    - service: light.turn_on
      target:
      entity_id: !input light
      data:
      transition: “{{ transition }}”
  
  # — Éteindre —
  - conditions:
    - condition: trigger
      id: “off_press”
      sequence:
    - service: light.turn_off
      target:
      entity_id: !input light
      data:
      transition: “{{ transition }}”
  
  # — Augmenter luminosité (appui court) —
  - conditions:
    - condition: trigger
      id: “dim_up_short”
      sequence:
    - service: light.turn_on
      target:
      entity_id: !input light
      data:
      brightness_step_pct: “{{ step }}”
      transition: “{{ transition }}”
  
  # — Augmenter luminosité (appui long) —
  - conditions:
    - condition: trigger
      id: “dim_up_long”
      sequence:
    - repeat:
      while:
      - condition: state
      entity_id: !input light
      state: “on”
      sequence:
      - service: light.turn_on
      target:
      entity_id: !input light
      data:
      brightness_step_pct: “{{ step }}”
      transition: 0.5
      - delay:
      milliseconds: 500
  
  # — Baisser luminosité (appui court) —
  - conditions:
    - condition: trigger
      id: “dim_down_short”
      sequence:
    - service: light.turn_on
      target:
      entity_id: !input light
      data:
      brightness_step_pct: “{{ step | int * -1 }}”
      transition: “{{ transition }}”
  
  # — Baisser luminosité (appui long) —
  - conditions:
    - condition: trigger
      id: “dim_down_long”
      sequence:
    - repeat:
      while:
      - condition: state
      entity_id: !input light
      state: “on”
      sequence:
      - service: light.turn_on
      target:
      entity_id: !input light
      data:
      brightness_step_pct: “{{ step | int * -1 }}”
      transition: 0.5
      - delay:
      milliseconds: 500