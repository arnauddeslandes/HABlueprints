blueprint:
  name: ZHA - Philips Hue Dimmer Switch
  description: >
    Contrôle une lumière avec le Philips Hue Dimmer Switch (RWL021) via ZHA.

    Boutons (numérotation ZHA) :
      1 = On  |  2 = Dim+  |  3 = Dim-  |  4 = Off

    - Bouton On  (court) : allumer la lumière (dernière luminosité)
    - Bouton On  (long)  : allumer à pleine luminosité (100 %)
    - Bouton +   (court) : augmenter la luminosité d'un pas
    - Bouton +   (long)  : augmenter la luminosité progressivement (répétition)
    - Bouton -   (court) : baisser la luminosité d'un pas
    - Bouton -   (long)  : baisser la luminosité progressivement (répétition)
    - Bouton Off (court) : éteindre la lumière
  domain: automation
  input:
    remote:
      name: Télécommande Hue Dimmer v2
      description: Sélectionner la télécommande Philips Hue Dimmer Switch v2 associée via ZHA.
      selector:
        device:
          integration: zha
          manufacturer: Philips
          model: RWL021
    light:
      name: Lumière à contrôler
      description: Sélectionner la lumière ou le groupe de lumières à contrôler.
      selector:
        target:
          entity:
            - domain: light
    brightness_step:
      name: Pas de variation de luminosité (%)
      description: Valeur en pourcentage de la variation appliquée à chaque appui court ou répétition longue.
      default: 15
      selector:
        number:
          min: 5
          max: 50
          step: 5
          unit_of_measurement: "%"
    transition_time:
      name: Durée de transition (secondes)
      description: Durée de la transition lors des changements de luminosité.
      default: 1
      selector:
        number:
          min: 0
          max: 5
          step: 0.5
          unit_of_measurement: s
  source_url: https://github.com/arnauddeslandes/HABlueprints/blob/main/zha-hue-dimmer-light.yaml

mode: restart
max_exceeded: silent

trigger:
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input remote

action:
  - variables:
      command: "{{ trigger.event.data.command }}"
      button: "{{ trigger.event.data.args.button | default(0) | int }}"
      step: !input brightness_step
      transition: !input transition_time

  - choose:
      # --- On (court) : allumer ---
      - conditions:
          - "{{ command == 'short_release' and button == 1 }}"
        sequence:
          - service: light.turn_on
            target: !input light
            data:
              transition: "{{ transition }}"

      # --- On (long/répétition) : 100 % ---
      - conditions:
          - "{{ command == 'repeat' and button == 1 }}"
        sequence:
          - service: light.turn_on
            target: !input light
            data:
              brightness_pct: 100
              transition: "{{ transition }}"

      # --- Off (court) : éteindre ---
      - conditions:
          - "{{ command == 'short_release' and button == 4 }}"
        sequence:
          - service: light.turn_off
            target: !input light
            data:
              transition: "{{ transition }}"

      # --- Dim+ (court) : +step% ---
      - conditions:
          - "{{ command == 'short_release' and button == 2 }}"
        sequence:
          - service: light.turn_on
            target: !input light
            data:
              brightness_step_pct: "{{ step }}"
              transition: "{{ transition }}"

      # --- Dim+ (long/répétition) : +step% à chaque répétition ---
      # L'événement 'repeat' est envoyé en continu tant que le bouton est maintenu.
      # mode:restart relance l'automation à chaque événement, produisant un effet continu.
      - conditions:
          - "{{ command == 'repeat' and button == 2 }}"
        sequence:
          - service: light.turn_on
            target: !input light
            data:
              brightness_step_pct: "{{ step }}"
              transition: 0.3

      # --- Dim- (court) : -step% ---
      - conditions:
          - "{{ command == 'short_release' and button == 3 }}"
        sequence:
          - service: light.turn_on
            target: !input light
            data:
              brightness_step_pct: "{{ step | int * -1 }}"
              transition: "{{ transition }}"

      # --- Dim- (long/répétition) : -step% à chaque répétition ---
      - conditions:
          - "{{ command == 'repeat' and button == 3 }}"
        sequence:
          - service: light.turn_on
            target: !input light
            data:
              brightness_step_pct: "{{ step | int * -1 }}"
              transition: 0.3
