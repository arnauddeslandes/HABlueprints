# ESPHome – Bookoo Espresso Monitor (Pressure) BLE Bridge
#
# Device BLE name : "BOOKOO" (prefix)
#
# ── SETUP ────────────────────────────────────────────────────────────────────
# 1. Find the monitor's Bluetooth MAC address:
#      • Android : install "nRF Connect", scan for a device named "BOOKOO…"
#      • Home Assistant : Settings → Devices → Bluetooth devices list
# 2. Replace XX:XX:XX:XX:XX:XX below with your monitor's MAC address.
# 3. Flash to an ESP32 placed within ~5 m of the monitor.
#
# ── SECRETS REQUIRED ─────────────────────────────────────────────────────────
#   wifi_ssid, wifi_password, api_encryption_key, ota_password
#
# ── PROTOCOL ─────────────────────────────────────────────────────────────────
# Source : BooKooCode/OpenSource – espresso_monitor/protocols.md
#
# Service UUID   : 0000fff0-0000-1000-8000-00805f9b34fb  (0x0FFF)
# Notify char    : 0000ff02-0000-1000-8000-00805f9b34fb  (0xFF02)
# Write char     : 0000ff01-0000-1000-8000-00805f9b34fb  (0xFF01)
#
# Notification packet (10 bytes):
#   [0]    0x02   product ID
#   [1]    0x1B   extraction data type
#   [2-3]  pressure×100  (big-endian uint16)  → divide by 100.0 → bar
#   [4]    battery %
#   [5-8]  reserved
#   [9]    checksum  (XOR of bytes 0–8)
#
# Command packet (7 bytes):
#   [0]    0x02   product ID
#   [1]    0x0C   command type
#   [2]    command  0x00=stop  0x01=start
#   [3-5]  0x00 0x00 0x00
#   [6]    checksum (XOR of bytes 0–5)
#
#   Stop extraction  : 02 0C 00 00 00 00 0E
#   Start extraction : 02 0C 01 00 00 00 0F
#
# No heartbeat or authentication required.
# Pressure range : 0–15 bar
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  device_name: bookoo-pressure
  friendly_name: "Bookoo Pressure"
  monitor_mac_address: "XX:XX:XX:XX:XX:XX"   # ← replace with your monitor's MAC

# ── Core ──────────────────────────────────────────────────────────────────────

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG   # set to INFO once pressure values are confirmed correct

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: "bookoopsi"

captive_portal:

# ── BLE ───────────────────────────────────────────────────────────────────────

esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

ble_client:
  - mac_address: ${monitor_mac_address}
    id: bookoo_pressure_client

    on_connect:
      - lambda: |-
          ESP_LOGI("bookoo_p", "Connected to Bookoo pressure monitor");

    on_disconnect:
      - lambda: |-
          ESP_LOGI("bookoo_p", "Disconnected from Bookoo pressure monitor");

# ── Scripts ───────────────────────────────────────────────────────────────────

script:
  - id: pressure_start_extraction
    then:
      - lambda: |-
          if (id(bookoo_pressure_client).state() != espbt::ClientState::ESTABLISHED) return;
          auto svc  = espbt::ESPBTUUID::from_raw("0000fff0-0000-1000-8000-00805f9b34fb");
          auto wchr = espbt::ESPBTUUID::from_raw("0000ff01-0000-1000-8000-00805f9b34fb");
          auto *chr = id(bookoo_pressure_client).get_characteristic(svc, wchr);
          if (chr == nullptr) return;
          // Start extraction : 02 0C 01 00 00 00 0F
          uint8_t cmd[] = {0x02, 0x0C, 0x01, 0x00, 0x00, 0x00, 0x0F};
          chr->write_value(cmd, sizeof(cmd));
          ESP_LOGI("bookoo_p", "Start extraction sent");

  - id: pressure_stop_extraction
    then:
      - lambda: |-
          if (id(bookoo_pressure_client).state() != espbt::ClientState::ESTABLISHED) return;
          auto svc  = espbt::ESPBTUUID::from_raw("0000fff0-0000-1000-8000-00805f9b34fb");
          auto wchr = espbt::ESPBTUUID::from_raw("0000ff01-0000-1000-8000-00805f9b34fb");
          auto *chr = id(bookoo_pressure_client).get_characteristic(svc, wchr);
          if (chr == nullptr) return;
          // Stop extraction : 02 0C 00 00 00 00 0E
          uint8_t cmd[] = {0x02, 0x0C, 0x00, 0x00, 0x00, 0x00, 0x0E};
          chr->write_value(cmd, sizeof(cmd));
          ESP_LOGI("bookoo_p", "Stop extraction sent");

# ── Sensors ───────────────────────────────────────────────────────────────────

sensor:
  # ── Pressure from BLE notifications ────────────────────────────────────────
  - platform: ble_client
    ble_client_id: bookoo_pressure_client
    id: bookoo_pressure
    name: "Pressure"
    unit_of_measurement: "bar"
    icon: "mdi:gauge"
    accuracy_decimals: 2
    state_class: measurement
    service_uuid: "0000fff0-0000-1000-8000-00805f9b34fb"
    characteristic_uuid: "0000ff02-0000-1000-8000-00805f9b34fb"
    notify: true

    lambda: |-
      if (x.size() < 10) return NAN;

      ESP_LOGD("bookoo_p", "RX [%d bytes]: %s",
               x.size(), format_hex_pretty(x.data(), x.size()).c_str());

      // Validate header
      if (x[0] != 0x02 || x[1] != 0x1B) {
        ESP_LOGW("bookoo_p", "Unexpected header: %02X %02X", x[0], x[1]);
        return NAN;
      }

      // Verify XOR checksum (bytes 0–8)
      uint8_t cksum = 0;
      for (int i = 0; i < 9; i++) cksum ^= x[i];
      if (cksum != x[9]) {
        ESP_LOGW("bookoo_p", "Checksum error: computed %02X, got %02X", cksum, x[9]);
        return NAN;
      }

      // Pressure (bytes 2-3, big-endian uint16, ÷100 → bar)
      uint16_t raw_pressure = ((uint16_t)x[2] << 8) | x[3];
      float pressure = (float)raw_pressure / 100.0f;

      // Battery – published separately
      id(bookoo_pressure_battery).publish_state((float)x[4]);

      ESP_LOGD("bookoo_p", "Pressure: %.2f bar  Battery: %d%%", pressure, x[4]);
      return pressure;

  # ── Battery (populated from pressure notification lambda) ───────────────────
  - platform: template
    id: bookoo_pressure_battery
    name: "Battery"
    unit_of_measurement: "%"
    icon: "mdi:battery"
    accuracy_decimals: 0
    device_class: battery
    state_class: measurement

# ── Binary sensors ────────────────────────────────────────────────────────────

binary_sensor:
  - platform: ble_client
    ble_client_id: bookoo_pressure_client
    id: bookoo_pressure_connected
    name: "Pressure Monitor Connected"
    icon: "mdi:bluetooth-connect"

# ── Buttons ───────────────────────────────────────────────────────────────────

button:
  - platform: template
    name: "Start Extraction"
    icon: "mdi:play-circle"
    on_press:
      - script.execute: pressure_start_extraction

  - platform: template
    name: "Stop Extraction"
    icon: "mdi:stop-circle"
    on_press:
      - script.execute: pressure_stop_extraction
